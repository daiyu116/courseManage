map $http_x_forwarded_for $real_client_ip {
    "~^([^,]+)" $1;
    default $remote_addr;
}
limit_req_zone $real_client_ip zone=api_limit:10m rate=10r/s;
limit_req_zone $real_client_ip zone=login_limit:10m rate=2r/s;
limit_req_zone $real_client_ip zone=upload_limit:10m rate=1r/s;

server {
    listen 80;
    # 如果要启用https，请取消注释以下内容，并确保你已经正确配置了SSL证书路径
    # listen 443 ssl;
    # ssl_certificate /usr/share/nginx/ssl/cert.pem;
    # ssl_certificate_key /usr/share/nginx/ssl/key.pem;
    
    server_name localhost;
    
    root /usr/share/nginx/html;
    index index.html;
    
    client_max_body_size 50M;

    server_tokens off;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    if ($http_user_agent ~* (scrapy|curl|wget|python-requests|httpclient|okhttp|java|perl|ruby)) {
        return 403;
    }
    
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/auth/login {
        limit_req zone=login_limit burst=3 nodelay;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        limit_req zone=upload_limit burst=10 nodelay;
        valid_referers none server_names 127.0.0.1 app-18080-qiusuo.cn60.ugdocker.link;
        if ($invalid_referer) {
            return 403;
        }
        proxy_pass http://backend:8000/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    location ~ /\.(env|git) {
        deny all;
        return 404;
    }

    location ~* ^/(robots\.txt|sitemap\.xml)$ {
        allow all;
    }
    
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}

